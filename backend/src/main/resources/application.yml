server:
  port: 8526
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
      enabled: true

spring:
  datasource:
    url: jdbc:mysql://db:3306/book_management?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&useUnicode=true&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

recommendation:
  search:
    mode: keyword
    min-score: 0.1
    use-embedding: false

storage:
  type: local
  local:
    base-path: ./uploads
    url-prefix: /uploads
  thumbnail:
    list:
      width: 120
      height: 160
      quality: 0.85
    detail:
      width: 400
      height: 540
      quality: 0.9
  watermark:
    enabled: true
    text: Library
    opacity: 0.3
